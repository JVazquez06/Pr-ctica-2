<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Práctica 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>

<body class="vh-100">
    <nav class="navbar navbar-expand-lg bg-warning">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PW2026</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText"
                aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarText">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Productos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#">Inventario</a>
                    </li>
                </ul>
                <span class="navbar-text">
                   Algo por mostrar
                </span>
            </div>
        </div>
    </nav>
    <div class="container-fluid  vh-100">
        <div class="row h-100">
            <div class="col-12 pt-5">
                <h3 class="text-center">Formulario de Ventas</h3>
                <p class="text-center text-white fs-5"> Principal</p>
                <div class="container">
                    <form id="formProducto" class="row g-3">
                        <div class="col-md-2">
                            <label for="inputID" class="form-label">ID</label>
                            <input type="number" class="form-control" id="inputID">
                        </div>
                        <div class="col-md-6">
                            <label for="inputProduct" class="form-label">Nombre del Producto</label>
                            <input type="text" class="form-control" id="inputProduct">
                        </div>
                        <div class="col-md-4">
                            <label for="inputCategory" class="form-label">Categoría</label>
                            <select id="inputCategory" class="form-select">
                                <option selected>Selecciona la categoría</option>
                                <option>Frutas</option>
                                <option>Verduras</option>
                                <option>Lácteos</option>
                            </select>
                        </div>
                        <div class="col-12 text-center justify-c">
                            <button type="submit" class="btn btn-danger">Cancelar</button>
                            <button type="submit" class="btn btn-success">Guardar</button>
                        </div>
                    </form><br>
                     <div class="col-12 text-center justify-c">
                            <button type="button" class="btn btn-primary" data-filter="Todos">Lista Completa</button>
                            <button type="button" class="btn btn-primary" data-filter="Frutas">Frutas</button>
                            <button type="button" class="btn btn-primary" data-filter="Verduras">Verduras</button>
                            <button type="button" class="btn btn-primary"data-filter="Lácteos">Lácteos</button>
                            <button type="button" class="btn btn-primary" id="btnToggleLista">Mostrar/Ocultar Lista</button>
                        </div>
                    <table id="listaProductos" class="table">
                        <thead>
                            <tr>
                            <th scope="col">ID</th>
                            <th scope="col">Producto</th>
                            <th scope="col">Categoría</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr>
                            <td>Ej ID</td>
                            <td>Ej Producto</td>
                            <td>Ej Categoría</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="JS/app.js"></script>
</body>
</html>
